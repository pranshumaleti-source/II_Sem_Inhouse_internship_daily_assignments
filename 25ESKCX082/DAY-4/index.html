<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            position: relative;
            height: 100vh;
            margin:0;

        }
        img{
            width: 100px;
            position: absolute;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <p>Apple: <span id="apple">0</span></p>
    <p>Banana: <span id="banana">0</span></p>

    <img src="/apple-colorful-vector-design_341269-1123.avif" onclick="clickimage('apple',this)">
    <img src="/banana.jpeg" onclick="clickimage('banana',this)">

    <script>
        let apple=0,banana=0;
        document.querySelectorAll("img").foreach(img=>{
            img.style.left=Math.random()*(window.innerWidth-100)+"px";
            img.style.top=Math.random()*(window.innerHeight-120)+"px";
        });
        function clickimage(type,img){
            if(type=="apple"){
                document.getElementById("apple").innerText=++apple;}
            else{
                document.getElementById("banana").innerText=++banana;

                }
            img.style.left=Math.random()*(window.innerWidth-100)+"px";
            img.style.top=Math.random()*(window.innerHeight-120)+"px";
            }
    </script>
</body>
</html>
